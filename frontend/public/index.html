<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>CangreDashboard - Cost Intelligence for OpenClaw</title>
    <link rel="stylesheet" href="./index.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.10.3/umd/Recharts.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const RechartsLib = window.Recharts || {};
        const hasCharts = !!window.Recharts;
        const { BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, LineChart, Line } = RechartsLib;

        const API_BASE = 'http://localhost:5001/api';

        // =====================================================================
        // COMPONENTS
        // =====================================================================

        function BudgetGauge({ monthCost, periods, loading }) {
            const [view, setView] = React.useState('current');
            if (loading || !monthCost) return null;
            const { current_spend, monthly_budget, pct_used, projected_month_end,
                    days_elapsed, days_remaining, days_in_month, daily_avg, budget_status, month } = monthCost;
            const barColor = budget_status === 'critical' ? '#f44336'
                           : budget_status === 'warning'  ? '#ff9800' : '#4caf50';
            const headroom = Math.max(0, monthly_budget - current_spend);
            const projColor = projected_month_end > monthly_budget ? '#f44336'
                            : projected_month_end > monthly_budget * 0.9 ? '#ff9800' : '#4caf50';
            const btnStyle = (active) => ({
                background: active ? '#2a3f5f' : 'transparent',
                border: '1px solid #2a3f5f',
                color: active ? '#e0e0e0' : '#606880',
                borderRadius: '4px',
                padding: '0.2rem 0.75rem',
                cursor: 'pointer',
                fontSize: '0.72rem',
                marginRight: '0.4rem',
            });
            const periodColor = (p) => p.spend > p.budget ? '#f44336' : p.spend > p.budget * 0.9 ? '#ff9800' : '#4caf50';
            return (
                <div>
                    <div style={{ marginBottom: '0.75rem' }}>
                        <button style={btnStyle(view === 'current')} onClick={() => setView('current')}>📅 Current</button>
                        <button style={btnStyle(view === 'history')} onClick={() => setView('history')}>📊 History</button>
                    </div>

                    {view === 'current' && (
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: '1rem', marginBottom: '0.5rem' }}>
                            {/* Tile 1 — Current */}
                            <div style={{ background: '#1a1f3a', borderRadius: '8px', padding: '1.2rem', borderLeft: `4px solid ${barColor}` }}>
                                <div style={{ color: '#a0a0a0', fontSize: '0.75rem', marginBottom: '0.4rem' }}>💳 Current spend — {month}</div>
                                <div style={{ color: '#e0e0e0', fontSize: '1.8rem', fontWeight: 'bold', marginBottom: '0.6rem' }}>
                                    ${Number(current_spend).toFixed(4)}
                                    <span style={{ fontSize: '0.9rem', color: '#a0a0a0', fontWeight: 'normal', marginLeft: '0.5rem' }}>/ ${monthly_budget}</span>
                                </div>
                                <div style={{ background: '#0a0e27', borderRadius: '4px', height: '6px', overflow: 'hidden', marginBottom: '0.4rem' }}>
                                    <div style={{ background: barColor, width: `${Math.min(pct_used, 100)}%`, height: '100%', transition: 'width 0.5s' }} />
                                </div>
                                <div style={{ color: barColor, fontSize: '0.75rem' }}>{Number(pct_used).toFixed(1)}% used · day {days_elapsed}/{days_in_month}</div>
                            </div>

                            {/* Tile 2 — Projected */}
                            <div style={{ background: '#1a1f3a', borderRadius: '8px', padding: '1.2rem', borderLeft: `4px solid ${projColor}` }}>
                                <div style={{ color: '#a0a0a0', fontSize: '0.75rem', marginBottom: '0.4rem' }}>📈 Projected month end</div>
                                <div style={{ color: '#e0e0e0', fontSize: '1.8rem', fontWeight: 'bold', marginBottom: '0.4rem' }}>
                                    ${Number(projected_month_end).toFixed(4)}
                                </div>
                                <div style={{ color: '#a0a0a0', fontSize: '0.75rem' }}>
                                    ${Number(daily_avg).toFixed(4)}/day avg · {days_remaining}d remaining
                                </div>
                                {projected_month_end > monthly_budget && (
                                    <div style={{ color: '#f44336', fontSize: '0.75rem', marginTop: '0.3rem' }}>⚠️ Over budget by ${Number(projected_month_end - monthly_budget).toFixed(4)}</div>
                                )}
                            </div>

                            {/* Tile 3 — Limit */}
                            <div style={{ background: '#1a1f3a', borderRadius: '8px', padding: '1.2rem', borderLeft: '4px solid #9c27b0' }}>
                                <div style={{ color: '#a0a0a0', fontSize: '0.75rem', marginBottom: '0.4rem' }}>🎯 Budget cap</div>
                                <div style={{ color: '#e0e0e0', fontSize: '1.8rem', fontWeight: 'bold', marginBottom: '0.4rem' }}>
                                    ${Number(monthly_budget).toFixed(2)}
                                </div>
                                <div style={{ color: '#4caf50', fontSize: '0.75rem' }}>
                                    ${Number(headroom).toFixed(4)} headroom left
                                </div>
                                <div style={{ color: '#606880', fontSize: '0.7rem', marginTop: '0.3rem' }}>GitHub Copilot · billing from Apr 10</div>
                            </div>
                        </div>
                    )}

                    {view === 'history' && (
                        <div style={{ background: '#1a1f3a', borderRadius: '8px', padding: '1.2rem' }}>
                            {(!periods || periods.length === 0) ? (
                                <div style={{ color: '#606880', fontSize: '0.8rem' }}>No historical periods yet.</div>
                            ) : (
                                <>
                                    <div style={{ color: '#a0a0a0', fontSize: '0.75rem', marginBottom: '1rem' }}>📊 Monthly spend vs ${monthly_budget} budget — deviations highlighted</div>
                                    {hasCharts && (
                                        <ResponsiveContainer width="100%" height={200}>
                                            <BarChart data={periods} margin={{ top: 8, right: 16, left: 0, bottom: 0 }}>
                                                <CartesianGrid strokeDasharray="3 3" stroke="#2a3a5e" />
                                                <XAxis dataKey="month" tick={{ fill: '#a0a0a0', fontSize: 11 }} />
                                                <YAxis tick={{ fill: '#a0a0a0', fontSize: 11 }} tickFormatter={v => `$${v}`} />
                                                <Tooltip
                                                    contentStyle={{ background: '#12172e', border: '1px solid #2a3a5e', fontSize: '0.78rem' }}
                                                    formatter={(v, name) => [`$${Number(v).toFixed(4)}`, name === 'spend' ? 'Spend' : 'Budget']}
                                                />
                                                <Bar dataKey="spend" name="spend" radius={[3,3,0,0]}>
                                                    {periods.map((p, i) => (
                                                        <Cell key={i} fill={p.is_setup ? '#607d8b' : periodColor(p)} />
                                                    ))}
                                                </Bar>
                                                <RechartsLib.ReferenceLine y={monthly_budget} stroke="#9c27b0" strokeDasharray="4 2" label={{ value: `$${monthly_budget} cap`, fill: '#9c27b0', fontSize: 10, position: 'insideTopRight' }} />
                                            </BarChart>
                                        </ResponsiveContainer>
                                    )}
                                    <div style={{ marginTop: '0.75rem', display: 'flex', flexDirection: 'column', gap: '0.35rem' }}>
                                        {periods.map((p, i) => (
                                            <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: '0.75rem' }}>
                                                <span style={{ color: '#a0a0a0' }}>
                                                    {p.month}
                                                    {p.is_setup && <span style={{ color: '#607d8b', marginLeft: '0.4rem' }}>(setup)</span>}
                                                </span>
                                                <span style={{ color: p.is_setup ? '#607d8b' : periodColor(p) }}>
                                                    ${p.spend.toFixed(4)} / ${p.budget} &nbsp;·&nbsp; {p.pct_used}%
                                                    {p.deviation > 0 && !p.is_setup && <span style={{ color: '#f44336', marginLeft: '0.4rem' }}>+${p.deviation.toFixed(4)}</span>}
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                    <div style={{ color: '#606880', fontSize: '0.68rem', marginTop: '0.6rem' }}>Grey bars = setup/learning months, not counted against budget performance.</div>
                                </>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        function MilestonesPanel({ milestones, onDelete, onAdd, onCompare, compareTarget }) {
            const [newName, setNewName] = React.useState('');
            const [newNote, setNewNote] = React.useState('');
            const [adding, setAdding] = React.useState(false);
            const [showForm, setShowForm] = React.useState(false);

            const handleAdd = async () => {
                if (!newName.trim()) return;
                setAdding(true);
                await onAdd(newName.trim(), newNote.trim());
                setNewName('');
                setNewNote('');
                setAdding(false);
                setShowForm(false);
            };

            if (milestones.length === 0 && !showForm) {
                return (
                    <div style={{ textAlign: 'center', padding: '1rem', color: '#a0a0a0', fontSize: '0.85rem' }}>
                        No milestones yet.
                        <button onClick={() => setShowForm(true)} style={{ marginLeft: '0.75rem', background: 'none', border: '1px solid #00bcd4', borderRadius: '4px', color: '#00bcd4', cursor: 'pointer', padding: '0.2rem 0.5rem', fontSize: '0.8rem' }}>➕ Add first milestone</button>
                    </div>
                );
            }

            return (
                <div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: '0.75rem', marginBottom: '0.75rem' }}>
                        {milestones.map(m => {
                            const isComparing = compareTarget?.id === m.id;
                            const s = m.snapshot || {};
                            return (
                                <div key={m.id} style={{ background: '#1a1f3a', borderRadius: '8px', padding: '0.9rem', border: `1px solid ${isComparing ? '#00bcd4' : '#2a3a5e'}` }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '0.4rem' }}>
                                        <div style={{ fontWeight: 'bold', color: '#e0e0e0', fontSize: '0.85rem' }}>{m.name}</div>
                                        <button onClick={() => onDelete(m.id)} style={{ background: 'none', border: 'none', color: '#606880', cursor: 'pointer', fontSize: '0.9rem', padding: '0' }} title="Delete">🗑</button>
                                    </div>
                                    {m.note && <div style={{ color: '#a0a0a0', fontSize: '0.72rem', marginBottom: '0.4rem', fontStyle: 'italic' }}>{m.note}</div>}
                                    <div style={{ color: '#606880', fontSize: '0.7rem', marginBottom: '0.5rem' }}>{new Date(m.created_at).toLocaleString()}</div>
                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.3rem', marginBottom: '0.5rem' }}>
                                        <span style={{ background: '#0a0e27', borderRadius: '3px', padding: '0.15rem 0.4rem', fontSize: '0.7rem', color: '#ff9800' }}>spend ${Number(s.repeated_prompt_spend || 0).toFixed(4)}</span>
                                        <span style={{ background: '#0a0e27', borderRadius: '3px', padding: '0.15rem 0.4rem', fontSize: '0.7rem', color: '#a0a0a0' }}>turns {s.repeated_prompt_turns || 0}</span>
                                        <span style={{ background: '#0a0e27', borderRadius: '3px', padding: '0.15rem 0.4rem', fontSize: '0.7rem', color: '#4caf50' }}>save ${Number(s.potential_savings || 0).toFixed(4)}</span>
                                        <span style={{ background: '#0a0e27', borderRadius: '3px', padding: '0.15rem 0.4rem', fontSize: '0.7rem', color: '#00bcd4' }}>merge {Number(s.merge_opportunity_score || 0).toFixed(1)}%</span>
                                    </div>
                                    <button
                                        onClick={() => onCompare(isComparing ? null : m)}
                                        style={{ background: isComparing ? '#00bcd4' : 'none', border: '1px solid #00bcd4', borderRadius: '4px', color: isComparing ? '#000' : '#00bcd4', cursor: 'pointer', padding: '0.2rem 0.5rem', fontSize: '0.75rem', width: '100%' }}
                                    >
                                        {isComparing ? '✓ Comparing' : 'Compare ↔'}
                                    </button>
                                </div>
                            );
                        })}
                    </div>

                    {showForm ? (
                        <div style={{ background: '#1a1f3a', borderRadius: '8px', padding: '0.9rem', border: '1px dashed #2a3a5e', display: 'flex', gap: '0.5rem', flexWrap: 'wrap', alignItems: 'flex-end' }}>
                            <div style={{ flex: '1 1 160px' }}>
                                <div style={{ fontSize: '0.7rem', color: '#a0a0a0', marginBottom: '0.2rem' }}>Name *</div>
                                <input
                                    value={newName}
                                    onChange={e => setNewName(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && handleAdd()}
                                    placeholder="e.g. Ops agent deployed"
                                    style={{ background: '#0a0e27', border: '1px solid #2a3a5e', borderRadius: '4px', color: '#e0e0e0', padding: '0.3rem 0.5rem', width: '100%', fontSize: '0.8rem' }}
                                />
                            </div>
                            <div style={{ flex: '1 1 160px' }}>
                                <div style={{ fontSize: '0.7rem', color: '#a0a0a0', marginBottom: '0.2rem' }}>Note (optional)</div>
                                <input
                                    value={newNote}
                                    onChange={e => setNewNote(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && handleAdd()}
                                    placeholder="What changed?"
                                    style={{ background: '#0a0e27', border: '1px solid #2a3a5e', borderRadius: '4px', color: '#e0e0e0', padding: '0.3rem 0.5rem', width: '100%', fontSize: '0.8rem' }}
                                />
                            </div>
                            <div style={{ display: 'flex', gap: '0.4rem' }}>
                                <button onClick={handleAdd} disabled={adding || !newName.trim()} style={{ background: '#00bcd4', border: 'none', borderRadius: '4px', color: '#000', cursor: 'pointer', padding: '0.35rem 0.7rem', fontSize: '0.8rem', fontWeight: 'bold' }}>{adding ? '...' : 'Save'}</button>
                                <button onClick={() => setShowForm(false)} style={{ background: 'none', border: '1px solid #606880', borderRadius: '4px', color: '#a0a0a0', cursor: 'pointer', padding: '0.35rem 0.7rem', fontSize: '0.8rem' }}>Cancel</button>
                            </div>
                        </div>
                    ) : (
                        <button onClick={() => setShowForm(true)} style={{ background: 'none', border: '1px dashed #2a3a5e', borderRadius: '4px', color: '#a0a0a0', cursor: 'pointer', padding: '0.5rem 1rem', fontSize: '0.8rem', width: '100%' }}>➕ Add milestone</button>
                    )}
                </div>
            );
        }

        function Overview({ overview, loading, onRefresh }) {
            const [showSessions, setShowSessions] = React.useState(false);
            const [activeSessions, setActiveSessions] = React.useState([]);
            const [sessionsLoading, setSessionsLoading] = React.useState(false);

            if (loading || !overview) return <div className="loading-container"><div className="loading-spinner">⏳</div></div>;

            const formatNumber = (num) => {
                if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
                if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
                return num.toString();
            };

            const toggleSessions = async () => {
                if (showSessions) { setShowSessions(false); return; }
                setSessionsLoading(true);
                try {
                    const res = await axios.get(`${API_BASE}/sessions?status=active&limit=20`);
                    setActiveSessions(res.data || []);
                } catch (e) { setActiveSessions([]); }
                setSessionsLoading(false);
                setShowSessions(true);
            };

            return (
                <div className="overview-grid">
                    <div className="stat-tile" onClick={toggleSessions} style={{ cursor: 'pointer' }}>
                        <div className="stat-label">🔄 Active Sessions</div>
                        <div className="stat-value">{overview.active_sessions}</div>
                        <div className="stat-subtext">{showSessions ? '▲ hide' : '▼ tap to expand'}</div>
                    </div>

                    <div className="stat-tile">
                        <div className="stat-label">🤖 Active Agents</div>
                        <div className="stat-value">{overview.agents.length}</div>
                        <div className="stat-subtext">{overview.agents.map(a => a.name || a.agent_id).join(', ')}</div>
                    </div>

                    {showSessions && (
                        <div style={{ gridColumn: '1 / -1', marginTop: '-0.5rem', marginBottom: '0.5rem' }}>
                            {sessionsLoading ? (
                                <div style={{ color: '#a0a0a0', fontSize: '0.85rem', padding: '0.5rem' }}>Loading…</div>
                            ) : activeSessions.length === 0 ? (
                                <div style={{ color: '#a0a0a0', fontSize: '0.85rem', padding: '0.5rem' }}>No active sessions right now.</div>
                            ) : (
                                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.8rem', color: '#c0c0c0' }}>
                                    <thead>
                                        <tr style={{ color: '#a0a0a0', borderBottom: '1px solid #2a3f5f' }}>
                                            <th style={{ textAlign: 'left', padding: '4px 8px' }}>Agent</th>
                                            <th style={{ textAlign: 'left', padding: '4px 8px' }}>Channel</th>
                                            <th style={{ textAlign: 'left', padding: '4px 8px' }}>Started</th>
                                            <th style={{ textAlign: 'left', padding: '4px 8px' }}>Messages</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {activeSessions.map((s, i) => (
                                            <tr key={s.session_id || i} style={{ borderBottom: '1px solid #1a2040' }}>
                                                <td style={{ padding: '4px 8px' }}>{s.agent_id}</td>
                                                <td style={{ padding: '4px 8px' }}>{s.channel || '—'}</td>
                                                <td style={{ padding: '4px 8px' }}>{s.started_at ? new Date(s.started_at).toLocaleString() : '—'}</td>
                                                <td style={{ padding: '4px 8px' }}>{s.message_count ?? '—'}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            )}
                        </div>
                    )}

                    <div style={{ gridColumn: '1 / -1' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                            <h3 className="section-title" style={{ margin: 0 }}>👥 Agent Breakdown</h3>
                            <button
                                onClick={onRefresh}
                                disabled={loading}
                                style={{
                                    background: 'none',
                                    border: '1px solid #ff4500',
                                    color: '#ff4500',
                                    borderRadius: '6px',
                                    padding: '3px 10px',
                                    cursor: loading ? 'not-allowed' : 'pointer',
                                    fontSize: '0.8rem',
                                    opacity: loading ? 0.5 : 1,
                                }}
                            >{loading ? '⏳' : '🔄 Refresh'}</button>
                        </div>
                        <div className="agent-list">
                            {overview.agents.map((agent) => (
                                <div key={agent.agent_id} className="agent-card">
                                    <div className="agent-name">🦞 {agent.name || agent.agent_id}</div>
                                    <div className="agent-stat">
                                        <span className="agent-stat-label">Tokens (Total):</span>
                                        <span className="agent-stat-value">{formatNumber(agent.total_tokens)}</span>
                                    </div>
                                    <div className="agent-stat">
                                        <span className="agent-stat-label">Cost (Total):</span>
                                        <span className="agent-stat-value">${agent.total_cost.toFixed(4)}</span>
                                    </div>
                                    <div className="agent-stat">
                                        <span className="agent-stat-label">Last Activity:</span>
                                        <span className="agent-stat-value" style={{ fontSize: '0.75rem' }}>
                                            {agent.last_activity ? new Date(agent.last_activity).toLocaleString() : 'N/A'}
                                        </span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function CostBreakdown({ models, summary, loading }) {
            if (loading || !models) return <div className="loading-container"><div className="loading-spinner">⏳</div></div>;

            const COLORS = ['#ff4500', '#00bcd4', '#4caf50', '#9c27b0', '#ff9800', '#e91e63', '#00acc1', '#ffc107'];
            const normalizedModels = models.map((m) => ({
                ...m,
                tokens: Number(m.tokens ?? m.total_tokens ?? 0),
                total_cost: Number(m.total_cost ?? m.cost ?? 0),
            }));

            if (!hasCharts) {
                return (
                    <div className="chart-container">
                        <div className="chart-title">💰 Cost by Model</div>
                        <div className="empty-state">
                            <p>Charts unavailable (CDN blocked). Showing table fallback.</p>
                        </div>
                        <div className="agent-list">
                            {normalizedModels.map((m, idx) => (
                                <div key={`${m.model}-${idx}`} className="agent-card">
                                    <div className="agent-name">{m.model}</div>
                                    <div className="agent-stat">
                                        <span className="agent-stat-label">Tokens</span>
                                        <span className="agent-stat-value">{m.tokens.toLocaleString()}</span>
                                    </div>
                                    <div className="agent-stat">
                                        <span className="agent-stat-label">Cost</span>
                                        <span className="agent-stat-value">{m.total_cost === 0 ? 'Free' : '$' + m.total_cost.toFixed(4)}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="grid-2col">
                    <div className="chart-container">
                        <div className="chart-title">📊 Token Distribution by Model</div>
                        <ResponsiveContainer width="100%" height={250}>
                            <PieChart>
                                <Pie
                                    data={normalizedModels}
                                    dataKey="tokens"
                                    nameKey="model"
                                    cx="50%"
                                    cy="50%"
                                    outerRadius={80}
                                    label
                                >
                                    {normalizedModels.map((entry, index) => (
                                        <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                                    ))}
                                </Pie>
                                <Tooltip
                                    contentStyle={{ background: '#1a1f3a', border: '1px solid #2a3f5f', borderRadius: '4px' }}
                                    formatter={(value) => value.toLocaleString()}
                                />
                            </PieChart>
                        </ResponsiveContainer>
                    </div>

                    <div className="chart-container">
                        <div className="chart-title">💵 Cost by Model</div>
                        <ResponsiveContainer width="100%" height={250}>
                            <BarChart data={normalizedModels.filter(m => m.total_cost > 0)}>
                                <CartesianGrid strokeDasharray="3 3" stroke="#2a3f5f" />
                                <XAxis dataKey="model" stroke="#a0a0a0" angle={-45} textAnchor="end" height={80} />
                                <YAxis stroke="#a0a0a0" />
                                <Tooltip
                                    contentStyle={{ background: '#1a1f3a', border: '1px solid #2a3f5f', borderRadius: '4px', color: '#e0e0e0' }}
                                    formatter={(value) => `$${value.toFixed(4)}`}
                                />
                                <Bar dataKey="total_cost" fill="#ff4500" />
                            </BarChart>
                        </ResponsiveContainer>
                    </div>
                </div>
            );
        }

        function BurnRate({ burnRate, loading }) {
            if (loading || !burnRate) return <div className="loading-container"><div className="loading-spinner">⏳</div></div>;

            return (
                <div className="chart-container">
                    <div className="chart-title">🔥 Burn Rate & Projections (Last {burnRate.window_hours}h)</div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: '1.5rem', marginTop: '1rem' }}>
                        <div style={{ background: 'rgba(255, 69, 0, 0.1)', padding: '1rem', borderRadius: '4px', borderLeft: '3px solid #ff4500' }}>
                            <div style={{ color: '#a0a0a0', fontSize: '0.85rem' }}>Cost per Hour</div>
                            <div style={{ fontSize: '1.8rem', fontWeight: 'bold', color: '#ff4500' }}>${burnRate.cost_per_hour.toFixed(6)}</div>
                        </div>
                        <div style={{ background: 'rgba(76, 175, 80, 0.1)', padding: '1rem', borderRadius: '4px', borderLeft: '3px solid #4caf50' }}>
                            <div style={{ color: '#a0a0a0', fontSize: '0.85rem' }}>Projected Daily</div>
                            <div style={{ fontSize: '1.8rem', fontWeight: 'bold', color: '#4caf50' }}>${burnRate.projected_daily_cost.toFixed(4)}</div>
                        </div>
                        <div style={{ background: 'rgba(156, 39, 176, 0.1)', padding: '1rem', borderRadius: '4px', borderLeft: '3px solid #9c27b0' }}>
                            <div style={{ color: '#a0a0a0', fontSize: '0.85rem' }}>Projected Monthly</div>
                            <div style={{ fontSize: '1.8rem', fontWeight: 'bold', color: '#9c27b0' }}>${burnRate.projected_monthly_cost.toFixed(2)}</div>
                        </div>
                        <div style={{ background: 'rgba(0, 188, 212, 0.1)', padding: '1rem', borderRadius: '4px', borderLeft: '3px solid #00bcd4' }}>
                            <div style={{ color: '#a0a0a0', fontSize: '0.85rem' }}>Tokens per Hour</div>
                            <div style={{ fontSize: '1.8rem', fontWeight: 'bold', color: '#00bcd4' }}>{burnRate.tokens_per_hour.toLocaleString()}</div>
                        </div>
                    </div>
                </div>
            );
        }

        function PromptCostAnalysis({ promptCosts, loading }) {
            if (loading || !promptCosts) return <div className="loading-container"><div className="loading-spinner">⏳</div></div>;

            const summary = promptCosts.summary || {};
            const prompts = promptCosts.prompts || [];
            const repeatedPrompts = promptCosts.repeated_prompts || [];

            return (
                <div>
                    <div className="overview-grid">
                        <div className="stat-tile">
                            <div className="stat-label">Billable Prompts</div>
                            <div className="stat-value">{summary.billable_prompts || 0}</div>
                            <div className="stat-subtext">Assistant turns with cost</div>
                        </div>
                        <div className="stat-tile">
                            <div className="stat-label">Avg Cost / Prompt</div>
                            <div className="stat-value">${Number(summary.avg_cost || 0).toFixed(4)}</div>
                            <div className="stat-subtext">Mean spend per billable turn</div>
                        </div>
                        <div className="stat-tile">
                            <div className="stat-label">Highest Prompt Cost</div>
                            <div className="stat-value">${Number(summary.highest_cost || 0).toFixed(4)}</div>
                            <div className="stat-subtext">Most expensive single turn</div>
                        </div>
                        <div className="stat-tile">
                            <div className="stat-label">Repeated Prompt Spend</div>
                            <div className="stat-value">${Number(summary.repeated_prompt_spend || 0).toFixed(4)}</div>
                            <div className="stat-subtext">{summary.repeated_prompt_turns || 0} repeated billable turns</div>
                        </div>
                        <div className="stat-tile">
                            <div className="stat-label">Potential Savings</div>
                            <div className="stat-value">${Number(summary.potential_savings || 0).toFixed(4)}</div>
                            <div className="stat-subtext">If repeated prompts were consolidated</div>
                        </div>
                        <div className="stat-tile">
                            <div className="stat-label">Merge Opportunity</div>
                            <div className="stat-value">{Number(summary.merge_opportunity_score || 0).toFixed(1)}%</div>
                            <div className="stat-subtext">Share of prompt spend that looks compressible</div>
                        </div>
                    </div>

                    <div className="grid-2col">
                        <div className="chart-container">
                            <div className="chart-title">💸 Highest-Cost Prompts</div>
                            {prompts.length === 0 ? (
                                <div className="empty-state"><p>No prompt cost data available yet</p></div>
                            ) : (
                                <div className="prompt-list">
                                    {prompts.map((item, idx) => (
                                        <div className="prompt-row" key={`${item.session_id}-${item.timestamp}-${idx}`}>
                                            <div className="prompt-row-head">
                                                <span className="badge badge-primary">{item.agent_id}</span>
                                                <span className="prompt-model">{item.model}</span>
                                                <span className="prompt-cost">${Number(item.cost || 0).toFixed(4)}</span>
                                            </div>
                                            <div className="prompt-preview">{item.prompt_preview}</div>
                                            <div className="prompt-meta">
                                                <span>{Number(item.tokens || 0).toLocaleString()} tokens</span>
                                                <span>in {Number(item.input_tokens || 0).toLocaleString()}</span>
                                                <span>out {Number(item.output_tokens || 0).toLocaleString()}</span>
                                                <span>cache {Number(item.cache_read_tokens || 0).toLocaleString()}</span>
                                                <span>{item.timestamp ? new Date(item.timestamp).toLocaleString() : 'N/A'}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        <div className="chart-container">
                            <div className="chart-title">♻️ Repeated Prompt Hotspots</div>
                            {repeatedPrompts.length === 0 ? (
                                <div className="empty-state"><p>No repeated prompts detected yet</p></div>
                            ) : (
                                <div className="prompt-list">
                                    {repeatedPrompts.map((item, idx) => (
                                        <div className="prompt-row" key={`${item.prompt_preview}-${idx}`}>
                                            <div className="prompt-row-head">
                                                <span className="badge badge-warning">{item.occurrences}x</span>
                                                <span className="prompt-model">{(item.agents || []).join(', ')}</span>
                                                <span className="prompt-cost">${Number(item.total_cost || 0).toFixed(4)}</span>
                                            </div>
                                            <div className="prompt-preview">{item.prompt_preview}</div>
                                            <div className="prompt-meta">
                                                <span>avg ${Number(item.avg_cost || 0).toFixed(4)}</span>
                                                <span>max ${Number(item.max_cost || 0).toFixed(4)}</span>
                                                <span>save ${Number(item.potential_savings || 0).toFixed(4)}</span>
                                                <span>merge {Number(item.merge_opportunity_score || 0).toFixed(1)}%</span>
                                                <span>{Number(item.total_tokens || 0).toLocaleString()} tokens</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function Recommendations({ promptCosts, onDrillItem, onRefresh }) {
            const repeated = (promptCosts?.repeated_prompts || []);
            const summary = promptCosts?.summary || {};
            const [hideResolved, setHideResolved] = React.useState(false);

            if (repeated.length === 0) return null;

            const STATUS_LABEL = {
                active: '🔴 active',
                watching: '🟡 watching',
                resolved: '✅ resolved',
                regressed: '🔄 regressed',
            };

            const acknowledge = async (item) => {
                const key = item.prompt_preview
                    .toLowerCase()
                    .replace(/\s+/g, ' ')
                    .replace(/[^a-z0-9 ]/g, '')
                    .slice(0, 180)
                    .trim();
                try {
                    await axios.post(`${API_BASE}/recommendations/acknowledge`, { prompt_key: key });
                    if (onRefresh) onRefresh();
                } catch (err) { console.error('Acknowledge failed', err); }
            };

            const visible = [...repeated]
                .sort((a, b) => b.potential_savings - a.potential_savings)
                .filter(item => !hideResolved || item.resolution_status !== 'resolved')
                .slice(0, 10);

            return (
                <div className="chart-container">
                    <div className="rec-header-bar">
                        <div className="chart-title">💡 Consolidation Recommendations</div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                            <label style={{ display: 'flex', alignItems: 'center', gap: '0.3rem', fontSize: '0.75rem', color: '#a0a0a0', cursor: 'pointer' }}>
                                <input type="checkbox" checked={hideResolved} onChange={e => setHideResolved(e.target.checked)} />
                                Hide resolved
                            </label>
                            <div className="rec-summary-pill">
                                {repeated.length} pattern{repeated.length !== 1 ? 's' : ''} &middot; potential save&nbsp;
                                <strong>${Number(summary.potential_savings || 0).toFixed(4)}</strong>
                            </div>
                        </div>
                    </div>
                    <div className="rec-list">
                        {visible.map((item, idx) => {
                            const status = item.resolution_status || 'active';
                            const canAck = status === 'active' || status === 'regressed';
                            return (
                                <div
                                    className="rec-item"
                                    key={idx}
                                    onClick={() => onDrillItem && onDrillItem(item)}
                                    style={{ cursor: onDrillItem ? 'pointer' : 'default', opacity: status === 'resolved' ? 0.65 : 1 }}
                                >
                                    <div className="rec-item-head">
                                        <span className="rec-rank">#{idx + 1}</span>
                                        <span style={{ fontSize: '0.72rem', background: '#0a0e27', borderRadius: '4px', padding: '0.1rem 0.4rem', color: status === 'resolved' ? '#4caf50' : status === 'watching' ? '#ff9800' : status === 'regressed' ? '#00bcd4' : '#f44336' }}>{STATUS_LABEL[status] || status}</span>
                                        <span className="rec-action">Consolidate {item.occurrences} identical calls</span>
                                        <span className="rec-saving">save ${Number(item.potential_savings || 0).toFixed(4)}</span>
                                    </div>
                                    <div className="rec-preview">"{item.prompt_preview}"</div>
                                    <div className="rec-meta">
                                        <span>avg ${Number(item.avg_cost || 0).toFixed(4)} each</span>
                                        <span>total ${Number(item.total_cost || 0).toFixed(4)}</span>
                                        <span>{Number(item.total_tokens || 0).toLocaleString()} tokens</span>
                                        <span>{(item.agents || []).join(', ')}</span>
                                        <span style={{ color: '#00bcd4' }}>{(item.sessions || []).length} session{(item.sessions || []).length !== 1 ? 's' : ''} → drill</span>
                                        {item.last_seen && <span style={{ color: '#606880' }}>last seen {new Date(item.last_seen).toLocaleDateString()}</span>}
                                    </div>
                                    {canAck && (
                                        <button
                                            onClick={e => { e.stopPropagation(); acknowledge(item); }}
                                            style={{ marginTop: '0.4rem', background: 'none', border: '1px solid #ff9800', borderRadius: '4px', color: '#ff9800', cursor: 'pointer', padding: '0.2rem 0.5rem', fontSize: '0.72rem' }}
                                        >
                                            ✓ Mark as fixed
                                        </button>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function Timeline({ timeline, loading }) {
            if (loading) return <div className="loading-container"><div className="loading-spinner">⏳</div></div>;
            if (!timeline || timeline.length === 0) return <div className="empty-state"><p>No execution data yet</p></div>;

            const formatTime = (timestamp) => new Date(timestamp).toLocaleTimeString();
            const formatTokens = (tokens) => {
                if (tokens >= 1000) return (tokens / 1000).toFixed(1) + 'K';
                return tokens.toString();
            };

            return (
                <div className="timeline-container">
                    {timeline.map((item, idx) => (
                        <div key={idx} className="timeline-item">
                            <div className="timeline-time">{formatTime(item.timestamp)}</div>
                            <div className="timeline-agent">🦞 {item.agent_id}</div>
                            <div className="timeline-model">{item.model} · {item.role}</div>
                            <div className="timeline-tokens">{formatTokens(item.tokens)} 🔤</div>
                        </div>
                    ))}
                </div>
            );
        }

        function BaselineDelta({ current, baseline }) {
            if (!baseline || !current) return null;
            const b = baseline.summary || {};
            const c = current;
            const metrics = [
                { key: 'repeated_prompt_spend', label: 'Repeated spend', fmt: v => `$${Number(v).toFixed(4)}` },
                { key: 'repeated_prompt_turns', label: 'Repeated turns', fmt: v => v },
                { key: 'potential_savings', label: 'Potential savings', fmt: v => `$${Number(v).toFixed(4)}` },
                { key: 'merge_opportunity_score', label: 'Merge score', fmt: v => `${Number(v).toFixed(1)}%` },
            ];
            return (
                <div style={{ display: 'flex', gap: '0.75rem', flexWrap: 'wrap', margin: '0.5rem 0 1rem 0', alignItems: 'center' }}>
                    <div style={{ fontSize: '0.7rem', color: '#a0a0a0', minWidth: '80px' }}>
                        vs baseline<br />{new Date(baseline.captured_at).toLocaleDateString()}
                    </div>
                    {metrics.map(({ key, label, fmt }) => {
                        const curr = c[key] || 0;
                        const base = b[key] || 0;
                        const delta = curr - base;
                        const pct = base !== 0 ? ((delta / Math.abs(base)) * 100) : 0;
                        const isGood = delta <= 0;
                        return (
                            <div key={key} style={{
                                background: '#1a1f3a', borderRadius: '6px', padding: '0.4rem 0.6rem',
                                border: `1px solid ${isGood ? '#4caf50' : '#ff5722'}`, minWidth: '130px'
                            }}>
                                <div style={{ fontSize: '0.65rem', color: '#a0a0a0' }}>{label}</div>
                                <div style={{ fontSize: '0.95rem', color: '#e0e0e0', fontWeight: 'bold' }}>{fmt(curr)}</div>
                                <div style={{ fontSize: '0.7rem', color: isGood ? '#4caf50' : '#ff5722' }}>
                                    {delta === 0 ? '—' : `${isGood ? '▼' : '▲'} ${Math.abs(pct).toFixed(1)}%`}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        function DrillModal({ item, onClose }) {
            const [turns, setTurns] = useState([]);
            const [loading, setLoading] = useState(false);
            useEffect(() => {
                if (!item) return;
                setLoading(true);
                const sessions = item.sessions || [];
                Promise.all(sessions.map(sid =>
                    axios.get(`${API_BASE}/sessions/${sid}/prompts`)
                )).then(results => {
                    setTurns(results.flatMap(r => r.data.turns || []));
                }).catch(console.error).finally(() => setLoading(false));
            }, [item]);
            if (!item) return null;
            return (
                <div
                    style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.75)', zIndex: 1000, display: 'flex', justifyContent: 'center', alignItems: 'flex-start', paddingTop: '5vh' }}
                    onClick={onClose}
                >
                    <div
                        style={{ background: '#12172e', borderRadius: '8px', padding: '1.5rem', width: '90%', maxWidth: '700px', maxHeight: '75vh', overflowY: 'auto', border: '1px solid #2a3a5e' }}
                        onClick={e => e.stopPropagation()}
                    >
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                            <div style={{ fontWeight: 'bold', color: '#00bcd4', fontSize: '0.9rem' }}>
                                {item.occurrences}x &middot; {(item.sessions || []).length} session{(item.sessions || []).length !== 1 ? 's' : ''}
                            </div>
                            <button onClick={onClose} style={{ background: 'none', border: 'none', color: '#e0e0e0', cursor: 'pointer', fontSize: '1.2rem' }}>✕</button>
                        </div>
                        <div style={{ color: '#a0a0a0', fontSize: '0.8rem', marginBottom: '1rem', fontStyle: 'italic' }}>
                            "{item.prompt_preview}"
                        </div>
                        {loading ? (
                            <div className="loading-container"><div className="loading-spinner">⏳</div></div>
                        ) : turns.length === 0 ? (
                            <p style={{ color: '#a0a0a0' }}>No turns found.</p>
                        ) : (
                            <div className="prompt-list">
                                {turns.map((turn, i) => (
                                    <div className="prompt-row" key={i}>
                                        <div className="prompt-row-head">
                                            <span className="prompt-model">{turn.model}</span>
                                            <span className="prompt-cost">${Number(turn.cost || 0).toFixed(4)}</span>
                                        </div>
                                        <div className="prompt-preview">{turn.prompt_preview}</div>
                                        <div className="prompt-meta">
                                            <span>{Number(turn.tokens || 0).toLocaleString()} tokens</span>
                                            <span style={{ color: '#606880' }}>{turn.session_id}</span>
                                            <span>{turn.timestamp ? new Date(turn.timestamp).toLocaleString() : 'N/A'}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function Dashboard() {
            const [overview, setOverview] = useState(null);
            const [models, setModels] = useState(null);
            const [summary, setSummary] = useState(null);
            const [timeline, setTimeline] = useState(null);
            const [burnRate, setBurnRate] = useState(null);
            const [promptCosts, setPromptCosts] = useState(null);
            const [monthCost, setMonthCost] = useState(null);
            const [periods, setPeriods] = useState([]);
            const [milestones, setMilestones] = useState([]);
            const [compareTarget, setCompareTarget] = useState(null);
            const [promptAgentId, setPromptAgentId] = useState('');
            const [promptStartDate, setPromptStartDate] = useState('');
            const [promptEndDate, setPromptEndDate] = useState('');
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [repeatedOnly, setRepeatedOnly] = useState(false);
            const [baseline, setBaseline] = useState(null);
            const [drillItem, setDrillItem] = useState(null);
            const [refreshKey, setRefreshKey] = useState(0);

            // Load baseline + milestones once on mount
            useEffect(() => {
                axios.get(`${API_BASE}/cost/baseline`).then(res => {
                    if (res.data.baseline) setBaseline(res.data.baseline);
                }).catch(() => {});
                axios.get(`${API_BASE}/milestones`).then(res => setMilestones(res.data || [])).catch(() => {});
            }, []);

            const captureBaseline = async () => {
                try {
                    const res = await axios.post(`${API_BASE}/cost/baseline`);
                    setBaseline(res.data.snapshot);
                } catch (err) { console.error('Failed to capture baseline', err); }
            };

            const addMilestone = async (name, note) => {
                try {
                    const res = await axios.post(`${API_BASE}/milestones`, { name, note });
                    setMilestones(prev => [...prev, res.data]);
                } catch (err) { console.error('Add milestone failed', err); }
            };

            const deleteMilestone = async (id) => {
                try {
                    await axios.delete(`${API_BASE}/milestones/${id}`);
                    setMilestones(prev => prev.filter(m => m.id !== id));
                    if (compareTarget?.id === id) setCompareTarget(null);
                } catch (err) { console.error('Delete milestone failed', err); }
            };

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        setLoading(true);
                        const promptParams = new URLSearchParams({ limit: '20' });
                        if (promptAgentId) promptParams.set('agent_id', promptAgentId);
                        if (promptStartDate) promptParams.set('start_date', promptStartDate);
                        if (promptEndDate) promptParams.set('end_date', promptEndDate);
                        if (repeatedOnly) promptParams.set('repeated_only', 'true');

                        const [overviewRes, modelsRes, summaryRes, timelineRes, burnRes, promptRes, monthRes, periodsRes] = await Promise.all([
                            axios.get(`${API_BASE}/overview`),
                            axios.get(`${API_BASE}/cost/by-model`),
                            axios.get(`${API_BASE}/metrics/summary`),
                            axios.get(`${API_BASE}/timeline?limit=50`),
                            axios.get(`${API_BASE}/cost/burn-rate?window_hours=24`),
                            axios.get(`${API_BASE}/cost/by-prompt?${promptParams.toString()}`),
                            axios.get(`${API_BASE}/cost/month`),
                            axios.get(`${API_BASE}/cost/periods`),
                        ]);

                        setOverview(overviewRes.data);
                        setModels(modelsRes.data);
                        setSummary(summaryRes.data);
                        setTimeline(timelineRes.data);
                        setBurnRate(burnRes.data);
                        setPromptCosts(promptRes.data);
                        setMonthCost(monthRes.data);
                        setPeriods(periodsRes.data || []);
                        setError(null);
                    } catch (err) {
                        const details = err?.response?.status ? ` (HTTP ${err.response.status})` : '';
                        setError(`Connection failed: ${err.message}${details}`);
                        console.error(err);
                    } finally {
                        setLoading(false);
                    }
                };

                fetchData();
                const interval = setInterval(fetchData, 15000); // Refresh every 15s
                return () => clearInterval(interval);
            }, [promptAgentId, promptStartDate, promptEndDate, repeatedOnly, refreshKey]);

            if (error) {
                return (
                    <div style={{ minHeight: '100vh', display: 'flex', justifyContent: 'center', alignItems: 'center' }}>
                        <div style={{ textAlign: 'center', background: '#1a1f3a', padding: '2rem', borderRadius: '8px', maxWidth: '500px' }}>
                            <h2 style={{ color: '#ff4500', marginBottom: '1rem' }}>⚠️ Connection Error</h2>
                            <p style={{ color: '#e0e0e0', marginBottom: '1rem' }}>{error}</p>
                            <p style={{ color: '#a0a0a0' }}>Make sure backend is running:</p>
                            <code style={{ background: '#0a0e27', padding: '1rem', display: 'block', borderRadius: '4px', marginTop: '1rem', color: '#00bcd4' }}>
                                cd ~/github/CangreDashboard/backend<br/>bash run.sh
                            </code>
                        </div>
                    </div>
                );
            }

            return (
                <div className="dashboard-container">
                    <div className="dashboard-header">
                        <h1>🦞 CangreDashboard</h1>
                        <p>Real-time cost intelligence for OpenClaw</p>
                    </div>

                    <div className="dashboard-content">
                        <div className="section">
                            <h2 className="section-title">💸 Budget</h2>
                            <BudgetGauge monthCost={monthCost} periods={periods} loading={loading} />
                        </div>

                        <div className="section">
                            <h2 className="section-title">📈 Overview</h2>
                            <Overview overview={overview} loading={loading} onRefresh={async () => {
                                try { await axios.post(`${API_BASE}/admin/rescan`); } catch(e) {}
                                setTimeout(() => setRefreshKey(k => k + 1), 800);
                            }} />
                        </div>

                        <div className="section">
                            <h2 className="section-title">💰 Cost Analysis</h2>
                            <CostBreakdown models={models} summary={summary} loading={loading} />
                        </div>

                        <div className="section">
                            <h2 className="section-title">🔥 Burn Rate & Projections</h2>
                            <BurnRate burnRate={burnRate} loading={loading} />
                        </div>

                        <div className="section">
                            <h2 className="section-title" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: '0.5rem' }}>
                                <span>🏁 Efficiency Milestones</span>
                            </h2>
                            <MilestonesPanel
                                milestones={milestones}
                                onDelete={deleteMilestone}
                                onAdd={addMilestone}
                                onCompare={setCompareTarget}
                                compareTarget={compareTarget}
                            />
                        </div>

                        <div className="section">
                            <h2 className="section-title">
                                🧠 Cost By Prompt
                                <a
                                    className="btn-export-csv"
                                    href={`${API_BASE}/export/prompt-costs.csv?limit=1000&mode=repeated${promptAgentId ? '&agent_id=' + promptAgentId : ''}${promptStartDate ? '&start_date=' + promptStartDate : ''}${promptEndDate ? '&end_date=' + promptEndDate : ''}`}
                                    download
                                >
                                    ⬇ Repeated CSV
                                </a>
                                &nbsp;
                                <button
                                    className="btn-export-csv"
                                    style={{ cursor: 'pointer', background: 'none', border: '1px solid #00bcd4', borderRadius: '4px', color: '#00bcd4', padding: '0.2rem 0.6rem', fontSize: '0.75rem' }}
                                    onClick={captureBaseline}
                                >
                                    📸 Baseline
                                </button>
                            </h2>
                            <div className="filter-bar">
                                <label className="filter-field">
                                    <span>Agent</span>
                                    <select value={promptAgentId} onChange={(event) => setPromptAgentId(event.target.value)}>
                                        <option value="">All agents</option>
                                        {(overview?.agents || []).map((agent) => (
                                            <option key={agent.agent_id} value={agent.agent_id}>{agent.name || agent.agent_id}</option>
                                        ))}
                                    </select>
                                </label>
                                <label className="filter-field">
                                    <span>Start date</span>
                                    <input type="date" value={promptStartDate} onChange={(event) => setPromptStartDate(event.target.value)} />
                                </label>
                                <label className="filter-field">
                                    <span>End date</span>
                                    <input type="date" value={promptEndDate} onChange={(event) => setPromptEndDate(event.target.value)} />
                                </label>
                                <label className="filter-field" style={{ flexDirection: 'row', alignItems: 'center', gap: '0.4rem' }}>
                                    <input type="checkbox" checked={repeatedOnly} onChange={e => setRepeatedOnly(e.target.checked)} />
                                    <span>Repeated only</span>
                                </label>
                                <button
                                    className="filter-reset"
                                    type="button"
                                    onClick={() => {
                                        setPromptAgentId('');
                                        setPromptStartDate('');
                                        setPromptEndDate('');
                                        setRepeatedOnly(false);
                                    }}
                                >
                                    Reset
                                </button>
                            </div>
                            <BaselineDelta
                                current={promptCosts?.summary}
                                baseline={compareTarget ? { captured_at: compareTarget.created_at, summary: compareTarget.snapshot } : baseline}
                            />
                            {compareTarget && (
                                <div style={{ fontSize: '0.72rem', color: '#00bcd4', marginBottom: '0.5rem' }}>
                                    Comparing vs milestone: <strong>{compareTarget.name}</strong>
                                    <button onClick={() => setCompareTarget(null)} style={{ marginLeft: '0.5rem', background: 'none', border: 'none', color: '#a0a0a0', cursor: 'pointer', fontSize: '0.72rem' }}>✕ clear</button>
                                </div>
                            )}
                            <PromptCostAnalysis promptCosts={promptCosts} loading={loading} />
                            <Recommendations
                                promptCosts={promptCosts}
                                onDrillItem={setDrillItem}
                                onRefresh={() => setRefreshKey(k => k + 1)}
                            />
                        </div>

                        <div className="section">
                            <h2 className="section-title">⏱️ Recent Execution Timeline</h2>
                            <Timeline timeline={timeline} loading={loading} />
                        </div>

                        <div style={{ textAlign: 'center', color: '#a0a0a0', marginTop: '3rem', fontSize: '0.85rem' }}>
                            {!hasCharts && <p style={{ color: '#ff9800' }}>Charts disabled: Recharts CDN unavailable.</p>}
                            <p>Last updated: {new Date().toLocaleTimeString()}</p>
                            <p>CangreDashboard v1.0 | OpenClaw Cost Intelligence</p>
                        </div>
                        {drillItem && <DrillModal item={drillItem} onClose={() => setDrillItem(null)} />}
                    </div>
                </div>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
